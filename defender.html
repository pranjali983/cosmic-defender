<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cosmic Defender</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial', sans-serif; }
        canvas { border: 2px solid #333; box-shadow: 0 0 20px #00d4ff; }
        #overlay { position: absolute; color: white; text-align: center; pointer-events: none; }
        .score-board { position: absolute; top: 10px; left: 10px; color: #00d4ff; font-size: 20px; }
    </style>
</head>
<body>

    <div class="score-board">SCORE: <span id="scoreVal">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreVal = document.getElementById('scoreVal');

        canvas.width = 400;
        canvas.height = 600;

        let score = 0;
        let gameActive = true;

        const player = {
            x: canvas.width / 2 - 15,
            y: canvas.height - 50,
            w: 30,
            h: 30,
            speed: 5,
            color: '#00d4ff'
        };

        const bullets = [];
        const enemies = [];
        const keys = {};

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function spawnEnemy() {
            if (!gameActive) return;
            const size = Math.random() * 30 + 20;
            enemies.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                w: size,
                h: size,
                speed: Math.random() * 2 + 1,
                color: '#ff4d4d'
            });
            setTimeout(spawnEnemy, 1000);
        }

        function update() {
            if (!gameActive) return;

            // Player Movement
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += player.speed;
            if (keys['Space']) {
                if (bullets.length === 0 || bullets[bullets.length-1].y < player.y - 100) {
                    bullets.push({ x: player.x + player.w/2 - 2, y: player.y, w: 4, h: 10 });
                }
            }

            // Update Bullets
            bullets.forEach((b, i) => {
                b.y -= 7;
                if (b.y < 0) bullets.splice(i, 1);
            });

            // Update Enemies
            enemies.forEach((en, i) => {
                en.y += en.speed;
                
                // Collision with player
                if (en.x < player.x + player.w && en.x + en.w > player.x &&
                    en.y < player.y + player.h && en.y + en.h > player.y) {
                    gameActive = false;
                    alert("SHIP DESTROYED! Final Score: " + score);
                    location.reload();
                }

                // Collision with bullets
                bullets.forEach((b, bi) => {
                    if (b.x < en.x + en.w && b.x + b.w > en.x &&
                        b.y < en.y + en.h && b.y + b.h > en.y) {
                        enemies.splice(i, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                        scoreVal.innerText = score;
                    }
                });

                if (en.y > canvas.height) enemies.splice(i, 1);
            });
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Stars
            ctx.fillStyle = '#fff';
            for(let i=0; i<20; i++) ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = player.color;
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Draw Bullets
            ctx.fillStyle = '#fff';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Draw Enemies
            ctx.shadowColor = '#ff4d4d';
            enemies.forEach(en => {
                ctx.fillStyle = en.color;
                ctx.fillRect(en.x, en.y, en.w, en.h);
            });

            ctx.shadowBlur = 0;
            update();
            requestAnimationFrame(draw);
        }

        spawnEnemy();
        draw();
    </script>
</body>
</html>
